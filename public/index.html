<!DOCTYPE html>
<html lang='pt-BR'>

<head>
  <meta charset='utf-8'>
  <title>To-Do</title>
  <script type="module">
    const form = document.querySelector('#add')
    // const itemTemplate = document.querySelector("#itemTemplate")
    // const add...

    function createElementItem(index, title) {
      const elClone = itemTemplate.content.cloneNode(true)
      const elTitle = elClone.querySelector('span')
      const elDelButton = elClone.querySelector('button')
      elTitle.innerText = title
      elDelButton.dataset.id = index // abre brecha pra um HACKIN danado!
      itemTemplate.parentElement.append(elClone)
    }

    void async function() {
      const response = await fetch('/todo')
      const items = await response.json()
      items.forEach((item, index) => createElementItem(index, item.title))
    }();

    form.addEventListener('submit', async (ev) => {
      ev.preventDefault()
      form.fieldset.setAttribute('disabled', true)
      const title = form.title.value
      if (title.trim() === '')
        return
      const response = await fetch('/todo', {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ title })
      })
      // const item = await response.json()
      createElementItem(-1, title)
      form.title.value = ''
      form.fieldset.removeAttribute('disabled')
    })

  </script>
</head>

<body>
  <form id="add">
    <fieldset name="fieldset">
      <input name="title">
      <button name="btAdd">add</button>
    </fieldset>
  </form>
  <ul>
    <template id="itemTemplate">
      <li>
        <span>...</span>
        <button>del</button>
      </li>
    </template>
  </ul>
</body>

</html>
